<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Log</title>
<style>
  :root {
    --asphalt: #1c1d1f;
    --asphalt-light: #26282b;
    --lane: #f5d264;
    --lane-dim: #6b5c2c;
    --chalk: #ffffff;
    --chalk-dim: #c2bdb1;
    --good: #8bc98b;
    --okay: #ecb955;
    --struggle: #e0796a;
    --line: #4a4c50;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--asphalt);
    color: var(--chalk);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  .stopwatch {
    font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  }

  header {
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--line);
  }

  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  header .sub {
    margin-top: 4px;
    font-size: 13px;
    color: var(--chalk-dim);
  }

  main {
    max-width: 520px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  .card {
    background: var(--asphalt-light);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .card h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--chalk-dim);
    margin: 0 0 14px;
    font-weight: 600;
  }

  .countdown-banner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: linear-gradient(135deg, rgba(245,210,100,0.14), rgba(245,210,100,0.04));
    border: 1px solid var(--lane-dim);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
  }

  .countdown-banner .count-icon {
    width: 90px;
    height: auto;
    display: block;
    margin-bottom: 2px;
  }

  .countdown-banner .count-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.25;
  }

  .countdown-banner .count-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 800;
    color: var(--lane);
    letter-spacing: -0.01em;
  }

  .countdown-banner .count-label {
    font-size: 12px;
    color: var(--chalk-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .row {
    display: flex;
    gap: 10px;
  }

  .field {
    flex: 1;
    margin-bottom: 20px;
  }

  .field-quiet {
    margin-bottom: 16px;
    opacity: 0.75;
  }

  .field-quiet input[type="date"] {
    padding: 7px 10px;
    font-size: 13px;
  }

  .field-quiet label {
    font-size: 11px;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--chalk-dim);
    margin-bottom: 6px;
    font-weight: 500;
  }

  input[type="date"],
  input[type="time"],
  input[type="number"] {
    width: 100%;
    background: var(--asphalt);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 12px;
    color: var(--chalk);
    font-size: 16px;
    font-family: inherit;
  }

  input:focus {
    outline: none;
    border-color: var(--lane-dim);
  }

  .duration-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .duration-row input {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    padding: 14px 10px;
  }

  .duration-colon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--chalk-dim);
  }

  .distance-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .distance-header label {
    margin-bottom: 0;
  }

  .distance-toggle {
    display: flex;
    background: var(--asphalt);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 2px;
    gap: 2px;
    opacity: 0.8;
  }

  .toggle-btn {
    border: none;
    background: none;
    color: var(--chalk-dim);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .toggle-btn.active {
    background: var(--lane-dim);
    color: var(--chalk);
  }

  #steps, #miles {
    font-size: 18px;
    font-weight: 600;
  }

  .field-hint {
    font-size: 11px;
    color: var(--chalk-dim);
    margin-top: 6px;
    line-height: 1.4;
  }

  .feeling-group {
    display: flex;
    gap: 8px;
  }

  .feeling-btn {
    flex: 1;
    padding: 14px 8px;
    border-radius: 8px;
    border: 1.5px solid var(--line);
    background: var(--asphalt);
    color: var(--chalk-dim);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.1s;
  }

  .feeling-btn:active {
    transform: scale(0.97);
  }

  .feeling-btn[data-val="Great"].active { border-color: var(--good); color: var(--good); background: rgba(139,201,139,0.14); }
  .feeling-btn[data-val="Okay"].active { border-color: var(--okay); color: var(--okay); background: rgba(236,185,85,0.14); }
  .feeling-btn[data-val="Struggled"].active { border-color: var(--struggle); color: var(--struggle); background: rgba(224,121,106,0.14); }

  .weather-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--chalk-dim);
    margin-top: 4px;
  }

  .weather-strip svg {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .weather-strip .weather-text {
    display: flex;
    flex-direction: column;
    line-height: 1.3;
  }

  .weather-strip .temp {
    font-family: 'JetBrains Mono', monospace;
    color: var(--lane);
    font-size: 17px;
    font-weight: 700;
  }

  .weather-strip .condition {
    font-size: 12px;
    color: var(--chalk-dim);
  }

  button.submit {
    width: 100%;
    padding: 14px;
    background: var(--lane);
    color: var(--asphalt);
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }

  button.submit:disabled {
    background: var(--lane-dim);
    cursor: not-allowed;
  }

  .stat-readout {
    display: flex;
    border-top: 1px solid var(--line);
    margin-top: 16px;
    padding-top: 16px;
  }

  .stat-readout.pulse {
    animation: statPulse 0.4s ease;
  }

  @keyframes statPulse {
    0% { transform: scale(0.97); opacity: 0.6; }
    60% { transform: scale(1.01); }
    100% { transform: scale(1); opacity: 1; }
  }

  .stat {
    flex: 1;
    text-align: center;
  }

  .stat .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--lane);
    line-height: 1.1;
  }

  .stat .lbl {
    font-size: 11px;
    color: var(--chalk-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  .pace-gauge {
    margin-top: 16px;
  }

  .pace-gauge-track {
    position: relative;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--struggle) 0%, var(--okay) 50%, var(--good) 100%);
  }

  .pace-gauge-fill {
    display: none;
  }

  .pace-gauge-marker {
    position: absolute;
    top: 50%;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--chalk);
    border: 2px solid var(--asphalt);
    transform: translate(-50%, -50%);
    transition: left 0.4s ease;
    left: 50%;
  }

  .pace-gauge-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--chalk-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
  }

  .pace-gauge-labels #paceGaugeTag {
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .history-item {
    border-bottom: 1px solid var(--line);
    padding: 14px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.15s ease;
    margin: 0 -18px;
    padding-left: 18px;
    padding-right: 18px;
    border-radius: 6px;
  }

  .history-item:hover, .history-item:active {
    background: var(--asphalt);
  }

  .history-item:last-child { border-bottom: none; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    animation: fadeInOverlay 0.15s ease;
  }

  @keyframes fadeInOverlay {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-card {
    background: var(--asphalt-light);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px 24px 24px;
    max-width: 400px;
    width: 100%;
    position: relative;
    animation: modalRise 0.2s ease;
  }

  @keyframes modalRise {
    from { transform: translateY(12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: none;
    border: none;
    color: var(--chalk-dim);
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
  }

  .modal-close:hover { color: var(--chalk); }

  .modal-date {
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 8px;
    padding-right: 30px;
  }

  .modal-feel-tag {
    margin-bottom: 8px;
    font-size: 13px;
    padding: 4px 10px;
  }

  .modal-stats {
    display: flex;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-top: 16px;
    padding: 20px 0;
  }

  .modal-stat {
    flex: 1;
    text-align: center;
  }

  .modal-stat-val {
    font-size: 30px;
    font-weight: 700;
    color: var(--lane);
    line-height: 1.1;
  }

  .modal-stat-lbl {
    font-size: 11px;
    color: var(--chalk-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
  }

  .modal-details {
    margin-top: 16px;
  }

  .modal-detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 18px;
    padding: 9px 0;
    color: var(--chalk-dim);
  }

  .modal-detail-row span:last-child {
    color: var(--chalk);
    font-weight: 600;
  }

  .modal-edit-btn {
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--chalk-dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .modal-edit-btn:hover {
    border-color: var(--lane-dim);
    color: var(--chalk);
  }

  .modal-edit-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .modal-edit-actions .submit {
    flex: 2;
    margin-top: 0;
  }

  .modal-cancel-btn {
    flex: 1;
    padding: 14px;
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--chalk-dim);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .modal-cancel-btn:hover {
    color: var(--chalk);
  }

  .history-left .date {
    font-size: 14px;
    font-weight: 600;
  }

  .history-left .meta {
    font-size: 12px;
    color: var(--chalk-dim);
    margin-top: 2px;
  }

  .history-right {
    text-align: right;
  }

  .history-right .pace {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--lane);
  }

  .feel-tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 4px;
  }

  .feel-tag.Great { background: rgba(111,174,111,0.15); color: var(--good); }
  .feel-tag.Okay { background: rgba(214,162,61,0.15); color: var(--okay); }
  .feel-tag.Struggled { background: rgba(194,97,79,0.15); color: var(--struggle); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    color: var(--chalk-dim);
    font-size: 13px;
    padding: 28px 0;
  }

  .status-msg {
    font-size: 13px;
    text-align: center;
    margin-top: 10px;
    min-height: 18px;
  }

  .status-msg.error { color: var(--struggle); }
  .status-msg.ok { color: var(--good); }

  .encouragement {
    text-align: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--lane);
    margin-top: 12px;
    letter-spacing: -0.01em;
  }

  .encouragement.pulse {
    animation: statPulse 0.4s ease;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--chalk-dim);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .delete-btn:hover { color: var(--struggle); }
  .card-heading-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: -6px;
  }

  .card-heading-row h2 {
    margin: 0;
  }

  @media (max-width: 600px) {
    .countdown-banner .count-icon {
      width: 72px;
    }
  }
</style>
</head>

<body>

<main>

  <div class="countdown-banner" id="countdownBanner"></div>

  <div class="card">
    <div class="card-heading-row">
      <h2>Log a run</h2>
    </div>

    <div class="field">
      <label for="durationMin">Duration</label>
      <div class="duration-row">
        <input type="number" id="durationMin" placeholder="MM" min="0" step="1" required>
        <span class="duration-colon">:</span>
        <input type="number" id="durationSec" placeholder="SS" min="0" max="59" step="1">
      </div>
    </div>

    <div class="field">
      <div class="distance-header">
        <label id="distanceLabel">Distance</label>
        <div class="distance-toggle">
          <button type="button" class="toggle-btn" data-mode="miles">Miles</button>
          <button type="button" class="toggle-btn active" data-mode="steps">Steps</button>
        </div>
      </div>
      <input type="number" id="steps" placeholder="e.g. 4500" min="0" style="display:none;">
      <input type="number" id="miles" placeholder="e.g. 3.1" min="0" step="0.01">
      <div class="field-hint" id="distanceHint" style="display:none;">Estimated from steps, usually within ~2% of GPS distance</div>
    </div>

    <div class="field field-quiet">
      <label for="date">Date</label>
      <input type="date" id="date">
    </div>

    <div class="field">
      <label>How did it feel?</label>
      <div class="feeling-group">
        <button type="button" class="feeling-btn" data-val="Great">Great</button>
        <button type="button" class="feeling-btn" data-val="Okay">Okay</button>
        <button type="button" class="feeling-btn" data-val="Struggled">Struggled</button>
      </div>
    </div>

    <div class="field field-quiet">
      <label>Weather right now</label>
      <div class="weather-strip" id="weatherStrip">Loading...</div>
    </div>

    <button class="submit" id="submitBtn">Save run</button>
    <div class="status-msg" id="statusMsg"></div>
    <div class="encouragement" id="encouragement" style="display:none;"></div>

    <div class="stat-readout" id="statReadout" style="display:none;">
      <div class="stat">
        <div class="val stopwatch" id="statPace">--</div>
        <div class="lbl">Min / mile</div>
      </div>
      <div class="stat">
        <div class="val stopwatch" id="statTime">--</div>
        <div class="lbl">Total time</div>
      </div>
      <div class="stat">
        <div class="val stopwatch" id="statSpm">--</div>
        <div class="lbl">Steps / min</div>
      </div>
    </div>

    <div class="pace-gauge" id="paceGauge" style="display:none;">
      <div class="pace-gauge-track">
        <div class="pace-gauge-fill" id="paceGaugeFill"></div>
        <div class="pace-gauge-marker" id="paceGaugeMarker"></div>
      </div>
      <div class="pace-gauge-labels">
        <span>Slow</span>
        <span id="paceGaugeTag">--</span>
        <span>Fast</span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>History</h2>
    <div id="historyList">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 3" width="36" height="36">
          <circle cx="12" cy="13" r="8"/>
          <line x1="12" y1="13" x2="12" y2="9"/>
          <line x1="9" y1="3" x2="15" y2="3"/>
        </svg>
        <div>First run's on the clock. Log one to get started.</div>
      </div>
    </div>
  </div>

</main>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPhvHvIbVBTUmbdKwh-IgJNYcJJC2C4aC1UQ4ReYhTWuBv_bcB_iAwvHa6gixZmOXg/exec';

  let selectedFeeling = '';
  let currentWeather = null;

  const dateEl = document.getElementById('date');
  const durationMinEl = document.getElementById('durationMin');
  const durationSecEl = document.getElementById('durationSec');
  const stepsEl = document.getElementById('steps');
  const milesEl = document.getElementById('miles');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  const weatherStrip = document.getElementById('weatherStrip');
  const historyList = document.getElementById('historyList');
  const statReadout = document.getElementById('statReadout');

  // Default date to today
  dateEl.value = new Date().toISOString().split('T')[0];

  // Distance mode toggle (miles vs steps), remembers last choice
  let distanceMode = localStorage_safe_get('distanceMode') || 'steps';

  function localStorage_safe_get(key) {
    try { return localStorage.getItem(key); } catch (e) { return null; }
  }
  function localStorage_safe_set(key, val) {
    try { localStorage.setItem(key, val); } catch (e) { /* ignore */ }
  }

  function setDistanceMode(mode) {
    distanceMode = mode;
    localStorage_safe_set('distanceMode', mode);
    document.querySelectorAll('.toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    const hint = document.getElementById('distanceHint');
    if (mode === 'miles') {
      milesEl.style.display = '';
      stepsEl.style.display = 'none';
      stepsEl.value = '';
      hint.style.display = 'none';
    } else {
      milesEl.style.display = 'none';
      stepsEl.style.display = '';
      milesEl.value = '';
      hint.style.display = 'block';
    }
  }

  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => setDistanceMode(btn.dataset.mode));
  });

  setDistanceMode(distanceMode);

  document.querySelectorAll('.feeling-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFeeling = btn.dataset.val;
    });
  });

  function fetchWeather() {
    // Oceanport, NJ approx coordinates
    const lat = 40.327;
    const lon = -74.046;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph`;

    fetch(url)
      .then(r => r.json())
      .then(data => {
        const c = data.current;
        const condition = weatherCodeToText(c.weather_code);
        currentWeather = {
          temp: Math.round(c.temperature_2m),
          condition: condition,
          wind: Math.round(c.wind_speed_10m)
        };
        weatherStrip.innerHTML = `${weatherCodeToIcon(c.weather_code)}<div class="weather-text"><span class="temp">${currentWeather.temp}°F</span><span class="condition">${condition}, ${currentWeather.wind} mph wind</span></div>`;
      })
      .catch(() => {
        weatherStrip.textContent = 'Weather unavailable';
      });
  }

  function weatherCodeToText(code) {
    const map = {
      0: 'Clear', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Overcast',
      45: 'Foggy', 48: 'Foggy',
      51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
      61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
      71: 'Light snow', 73: 'Snow', 75: 'Heavy snow',
      80: 'Rain showers', 81: 'Rain showers', 82: 'Heavy showers',
      95: 'Thunderstorm'
    };
    return map[code] || 'Conditions unclear';
  }

  function weatherCodeToIcon(code) {
    // Simple, high-contrast inline SVG icons. Sun uses lane yellow,
    // clouds and rain use chalk tones so they stay legible outdoors.
    const sun = `<svg viewBox="0 0 24 24" fill="none" stroke="#f5d264" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5" fill="#f5d264"/><line x1="12" y1="2" x2="12" y2="4.5"/><line x1="12" y1="19.5" x2="12" y2="22"/><line x1="2" y1="12" x2="4.5" y2="12"/><line x1="19.5" y1="12" x2="22" y2="12"/><line x1="4.6" y1="4.6" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.4" y2="19.4"/><line x1="4.6" y1="19.4" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.4" y2="4.6"/></svg>`;
    const partlyCloudy = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="3.5" fill="#f5d264" stroke="none"/><path d="M7 19h10a4 4 0 0 0 0-8 5.5 5.5 0 0 0-10.5 1.5A3.5 3.5 0 0 0 7 19z" fill="#ffffff" stroke="#ffffff"/></svg>`;
    const cloudy = `<svg viewBox="0 0 24 24" fill="#ffffff" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18h11a4 4 0 0 0 0-8 6 6 0 0 0-11.5 1.8A3.5 3.5 0 0 0 6 18z"/></svg>`;
    const fog = `<svg viewBox="0 0 24 24" fill="none" stroke="#c2bdb1" stroke-width="2" stroke-linecap="round"><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="13" x2="21" y2="13"/><line x1="3" y1="17" x2="21" y2="17"/></svg>`;
    const rain = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M6 14h11a4 4 0 0 0 0-8 6 6 0 0 0-11.5 1.8A3.5 3.5 0 0 0 6 14z" fill="#ffffff" stroke="#ffffff"/><line x1="8" y1="17" x2="7" y2="21" stroke="#5b9cf6"/><line x1="12" y1="17" x2="11" y2="21" stroke="#5b9cf6"/><line x1="16" y1="17" x2="15" y2="21" stroke="#5b9cf6"/></svg>`;
    const snow = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M6 14h11a4 4 0 0 0 0-8 6 6 0 0 0-11.5 1.8A3.5 3.5 0 0 0 6 14z" fill="#ffffff" stroke="#ffffff"/><circle cx="8" cy="19" r="1" fill="#ffffff" stroke="none"/><circle cx="12" cy="20" r="1" fill="#ffffff" stroke="none"/><circle cx="16" cy="19" r="1" fill="#ffffff" stroke="none"/></svg>`;
    const storm = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13h11a4 4 0 0 0 0-8 6 6 0 0 0-11.5 1.8A3.5 3.5 0 0 0 6 13z" fill="#ffffff" stroke="#ffffff"/><polygon points="13,14 9,20 12,20 10,24 16,17 13,17" fill="#f5d264" stroke="#f5d264"/></svg>`;

    if (code === 0) return sun;
    if (code === 1 || code === 2) return partlyCloudy;
    if (code === 3) return cloudy;
    if (code === 45 || code === 48) return fog;
    if ([51,53,55,61,63,65,80,81,82].includes(code)) return rain;
    if ([71,73,75].includes(code)) return snow;
    if (code === 95) return storm;
    return cloudy;
  }

  function formatMinutes(totalMin) {
    if (!totalMin && totalMin !== 0) return '--';
    const h = Math.floor(totalMin / 60);
    const m = Math.floor(totalMin % 60);
    const s = Math.round((totalMin % 1) * 60);
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  function formatPace(paceMin) {
    if (!paceMin && paceMin !== 0) return '--';
    const m = Math.floor(paceMin);
    const s = Math.round((paceMin - m) * 60);
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  function vibrateSuccess() {
    if (navigator.vibrate) {
      navigator.vibrate([15, 40, 15]);
    }
  }

  function vibrateError() {
    if (navigator.vibrate) {
      navigator.vibrate(60);
    }
  }

  submitBtn.addEventListener('click', () => {
    const date = dateEl.value;
    const durationMin = durationMinEl.value;
    const durationSec = durationSecEl.value;
    const steps = distanceMode === 'steps' ? stepsEl.value : '';
    const miles = distanceMode === 'miles' ? milesEl.value : '';

    if (!date || !durationMin) {
      showStatus('Date and duration are required', true);
      vibrateError();
      return;
    }
    if (!steps && !miles) {
      showStatus('Enter steps or miles', true);
      vibrateError();
      return;
    }
    if (!selectedFeeling) {
      showStatus('Pick how the run felt', true);
      vibrateError();
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving...';

    const totalMinutes = Number(durationMin) + (durationSec ? Number(durationSec) / 60 : 0);

    const params = new URLSearchParams({
      action: 'addRun',
      date, durationMinutes: totalMinutes, steps, miles,
      feeling: selectedFeeling,
      weatherTemp: currentWeather ? currentWeather.temp : '',
      weatherCondition: currentWeather ? currentWeather.condition : '',
      weatherWind: currentWeather ? currentWeather.wind : ''
    });

    fetch(`${SCRIPT_URL}?${params.toString()}`)
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          showStatus(data.error, true);
          vibrateError();
          return;
        }
        vibrateSuccess();
        showStats(data);
        showEncouragement(selectedFeeling);
        if (!data.milesEstimated) {
          showStatus('Run saved', false);
        }
        resetForm();
        loadHistory();
      })
      .catch(() => showStatus('Could not save run, check connection', true))
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save run';
      });
  });

  const ENCOURAGEMENT = {
    Great: [
      "Nice work out there.",
      "Look at you go.",
      "Crushed it.",
      "That's how it's done.",
      "Way to show up today.",
      "Proud of you for getting out there.",
      "Building something here.",
      "Well earned.",
      "Consistency looks good on you.",
      "Stacking up the miles."
    ],
    Okay: [
      "Another one in the books.",
      "That's a solid effort.",
      "Every run counts.",
      "Good on you.",
      "Showing up is the hard part. Done.",
      "That's another brick in the wall.",
      "Nice, steady progress.",
      "Getting it done, one run at a time."
    ],
    Struggled: [
      "Tough one, but you finished it.",
      "That took something. Nice work.",
      "Showing up on a hard day counts double.",
      "Not every run feels good. You still did it.",
      "Rough one, but it's in the books.",
      "Some days are just about finishing. You did."
    ]
  };

  function pickEncouragement(feeling) {
    const pool = ENCOURAGEMENT[feeling] || ENCOURAGEMENT.Okay;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function showEncouragement(feeling) {
    const el = document.getElementById('encouragement');
    el.textContent = pickEncouragement(feeling);
    el.style.display = 'block';
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  }

  function showStats(data) {
    statReadout.style.display = 'flex';
    statReadout.classList.remove('pulse');
    void statReadout.offsetWidth; // restart animation
    statReadout.classList.add('pulse');
    document.getElementById('statPace').textContent = formatPace(data.pacePerMile);
    document.getElementById('statTime').textContent = formatMinutes(data.totalMinutes);
    document.getElementById('statSpm').textContent = data.stepsPerMinute ? Math.round(data.stepsPerMinute) : '--';
    updatePaceGauge(data.pacePerMile);
    if (data.milesEstimated) {
      showStatus(`Run saved. Miles estimated at ${data.miles} mi from steps (~2% margin vs GPS)`, false);
    }
  }

  function updatePaceGauge(paceMin) {
    const gauge = document.getElementById('paceGauge');
    const marker = document.getElementById('paceGaugeMarker');
    const tag = document.getElementById('paceGaugeTag');

    if (!paceMin && paceMin !== 0) {
      gauge.style.display = 'none';
      return;
    }
    gauge.style.display = 'block';

    // Fast end 7:30/mi, slow end 10:30/mi, calibrated to her actual range
    const FAST = 7.5;
    const SLOW = 10.5;
    let pct = (SLOW - paceMin) / (SLOW - FAST);
    pct = Math.max(0, Math.min(1, pct));
    marker.style.left = `${pct * 100}%`;

    let label, color;
    if (paceMin <= 8.25) { label = 'Fast'; color = 'var(--good)'; }
    else if (paceMin <= 9.5) { label = 'Steady'; color = 'var(--okay)'; }
    else { label = 'Easy'; color = 'var(--struggle)'; }
    tag.textContent = label;
    tag.style.color = color;
  }

  function showStatus(msg, isError) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg ' + (isError ? 'error' : 'ok');
  }

  function resetForm() {
    durationMinEl.value = '';
    durationSecEl.value = '';
    stepsEl.value = '';
    milesEl.value = '';
    selectedFeeling = '';
    document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('active'));
  }

  let cachedRuns = [];

  function loadHistory() {
    fetch(`${SCRIPT_URL}?action=getRuns`)
      .then(r => r.json())
      .then(data => {
        cachedRuns = data.runs || [];
        if (cachedRuns.length === 0) {
          historyList.innerHTML = `<div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 3" width="36" height="36">
              <circle cx="12" cy="13" r="8"/>
              <line x1="12" y1="13" x2="12" y2="9"/>
              <line x1="9" y1="3" x2="15" y2="3"/>
            </svg>
            <div>First run's on the clock. Log one to get started.</div>
          </div>`;
          return;
        }
        historyList.innerHTML = cachedRuns.map((run, i) => {
          const parsedDate = new Date(run.Date);
          const dateStr = isNaN(parsedDate) ? run.Date : parsedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
          const metaParts = [];
          if (run.Miles) metaParts.push(run.MilesEstimated ? `~${run.Miles} mi` : `${run.Miles} mi`);
          if (run.Steps) metaParts.push(`${run.Steps} steps`);
          if (run.WeatherTemp) metaParts.push(`${run.WeatherTemp}°F`);
          return `
            <div class="history-item" onclick="openRunDetail(${i})">
              <div class="history-left">
                <div class="date">${dateStr}</div>
                <div class="meta">${metaParts.join(' · ')}</div>
                ${run.Feeling ? `<span class="feel-tag ${run.Feeling}">${run.Feeling}</span>` : ''}
              </div>
              <div class="history-right">
                <div class="pace stopwatch">${formatPace(run.PacePerMile)} /mi</div>
                <button class="delete-btn" onclick="event.stopPropagation(); deleteRun('${run.RowId}')">Delete</button>
              </div>
            </div>
          `;
        }).join('');
      })
      .catch(() => {
        historyList.innerHTML = '<div class="empty-state">Could not load history</div>';
      });
  }

  function deleteRun(rowId) {
    if (!confirm('Delete this run?')) return;
    fetch(`${SCRIPT_URL}?action=deleteRun&rowId=${rowId}`)
      .then(r => r.json())
      .then(() => loadHistory());
  }

  function openRunDetail(index) {
    const run = cachedRuns[index];
    if (!run) return;

    const existing = document.getElementById('runDetailModal');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.id = 'runDetailModal';
    overlay.className = 'modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) closeRunDetail(); };

    overlay.innerHTML = `
      <div class="modal-card">
        <button class="modal-close" onclick="closeRunDetail()">&times;</button>
        <div id="modalBody"></div>
      </div>
    `;

    document.body.appendChild(overlay);
    renderModalView(run);
  }

  function closeRunDetail() {
    const existing = document.getElementById('runDetailModal');
    if (existing) existing.remove();
  }

  function renderModalView(run) {
    const parsedDate = new Date(run.Date);
    const dateStr = isNaN(parsedDate) ? run.Date : parsedDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', timeZone: 'UTC' });
    const distanceLine = run.Miles ? (run.MilesEstimated ? `~${run.Miles} mi (estimated)` : `${run.Miles} mi`) : '--';

    document.getElementById('modalBody').innerHTML = `
      <div class="modal-date">${dateStr}</div>
      ${run.Feeling ? `<span class="feel-tag ${run.Feeling} modal-feel-tag">${run.Feeling}</span>` : ''}

      <div class="modal-stats">
        <div class="modal-stat">
          <div class="modal-stat-val stopwatch">${formatPace(run.PacePerMile)}</div>
          <div class="modal-stat-lbl">Min / mile</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-val stopwatch">${formatMinutes(run.TotalMinutes)}</div>
          <div class="modal-stat-lbl">Total time</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-val stopwatch">${run.StepsPerMinute ? Math.round(run.StepsPerMinute) : '--'}</div>
          <div class="modal-stat-lbl">Steps / min</div>
        </div>
      </div>

      <div class="modal-details">
        <div class="modal-detail-row"><span>Distance</span><span>${distanceLine}</span></div>
        ${run.Steps ? `<div class="modal-detail-row"><span>Steps</span><span>${run.Steps}</span></div>` : ''}
        ${run.WeatherTemp ? `<div class="modal-detail-row"><span>Weather</span><span>${run.WeatherTemp}°F, ${run.WeatherCondition || ''}</span></div>` : ''}
      </div>

      <button class="modal-edit-btn" onclick="renderModalEdit('${run.RowId}')">Edit this run</button>
    `;
  }

  function renderModalEdit(rowId) {
    const run = cachedRuns.find(r => r.RowId === rowId);
    if (!run) return;

    const totalMin = run.TotalMinutes || 0;
    const mins = Math.floor(totalMin);
    const secs = Math.round((totalMin - mins) * 60);
    const editMode = run.Steps && !run.Miles ? 'steps' : (run.Steps ? 'steps' : 'miles');
    const hasSteps = !!run.Steps;

    document.getElementById('modalBody').innerHTML = `
      <div class="modal-date">Edit run</div>

      <div class="field">
        <label>Date</label>
        <input type="date" id="editDate" value="${run.Date}">
      </div>

      <div class="field">
        <label>Duration</label>
        <div class="duration-row">
          <input type="number" id="editDurationMin" value="${mins}" min="0" step="1">
          <span class="duration-colon">:</span>
          <input type="number" id="editDurationSec" value="${secs}" min="0" max="59" step="1">
        </div>
      </div>

      <div class="field">
        <div class="distance-header">
          <label>Distance</label>
          <div class="distance-toggle">
            <button type="button" class="toggle-btn ${editMode === 'miles' ? 'active' : ''}" data-mode="miles" onclick="editSetDistanceMode('miles')">Miles</button>
            <button type="button" class="toggle-btn ${editMode === 'steps' ? 'active' : ''}" data-mode="steps" onclick="editSetDistanceMode('steps')">Steps</button>
          </div>
        </div>
        <input type="number" id="editSteps" placeholder="e.g. 4500" min="0" value="${hasSteps ? run.Steps : ''}" style="display:${editMode === 'steps' ? '' : 'none'};">
        <input type="number" id="editMiles" placeholder="e.g. 3.1" min="0" step="0.01" value="${!hasSteps && run.Miles ? run.Miles : ''}" style="display:${editMode === 'miles' ? '' : 'none'};">
      </div>

      <div class="field">
        <label>How did it feel?</label>
        <div class="feeling-group">
          <button type="button" class="feeling-btn ${run.Feeling === 'Great' ? 'active' : ''}" data-val="Great" onclick="editSetFeeling('Great')">Great</button>
          <button type="button" class="feeling-btn ${run.Feeling === 'Okay' ? 'active' : ''}" data-val="Okay" onclick="editSetFeeling('Okay')">Okay</button>
          <button type="button" class="feeling-btn ${run.Feeling === 'Struggled' ? 'active' : ''}" data-val="Struggled" onclick="editSetFeeling('Struggled')">Struggled</button>
        </div>
      </div>

      <div class="modal-edit-actions">
        <button class="modal-cancel-btn" onclick="renderModalView(cachedRuns.find(r => r.RowId === '${rowId}'))">Cancel</button>
        <button class="submit" id="editSaveBtn" onclick="saveRunEdit('${rowId}')">Save changes</button>
      </div>
      <div class="status-msg" id="editStatusMsg"></div>
    `;

    window.editDistanceMode = editMode;
    window.editFeeling = run.Feeling;
  }

  function editSetDistanceMode(mode) {
    window.editDistanceMode = mode;
    document.querySelectorAll('#modalBody .toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    document.getElementById('editMiles').style.display = mode === 'miles' ? '' : 'none';
    document.getElementById('editSteps').style.display = mode === 'steps' ? '' : 'none';
  }

  function editSetFeeling(val) {
    window.editFeeling = val;
    document.querySelectorAll('#modalBody .feeling-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.val === val);
    });
  }

  function saveRunEdit(rowId) {
    const date = document.getElementById('editDate').value;
    const durationMin = document.getElementById('editDurationMin').value;
    const durationSec = document.getElementById('editDurationSec').value;
    const steps = window.editDistanceMode === 'steps' ? document.getElementById('editSteps').value : '';
    const miles = window.editDistanceMode === 'miles' ? document.getElementById('editMiles').value : '';
    const feeling = window.editFeeling || '';
    const statusEl = document.getElementById('editStatusMsg');

    if (!date || !durationMin) {
      statusEl.textContent = 'Date and duration are required';
      statusEl.className = 'status-msg error';
      return;
    }
    if (!steps && !miles) {
      statusEl.textContent = 'Enter steps or miles';
      statusEl.className = 'status-msg error';
      return;
    }

    const saveBtn = document.getElementById('editSaveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    const totalMinutes = Number(durationMin) + (durationSec ? Number(durationSec) / 60 : 0);

    const params = new URLSearchParams({
      action: 'updateRun',
      rowId, date, durationMinutes: totalMinutes, steps, miles, feeling
    });

    fetch(`${SCRIPT_URL}?${params.toString()}`)
      .then(r => r.json())
      .then(data => {
        if (data.error || !data.success) {
          statusEl.textContent = data.error || 'Could not save changes';
          statusEl.className = 'status-msg error';
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save changes';
          return;
        }
        closeRunDetail();
        loadHistory();
      })
      .catch(() => {
        statusEl.textContent = 'Could not save, check connection';
        statusEl.className = 'status-msg error';
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save changes';
      });
  }

  function updateCountdown() {
    const raceDate = new Date('2026-10-04T00:00:00');
    const now = new Date();
    const msPerDay = 1000 * 60 * 60 * 24;
    const diffDays = Math.ceil((raceDate - now) / msPerDay);

    const el = document.getElementById('countdownBanner');
    const icon = `<img class="count-icon" src="runner.gif" alt="">`;

    if (diffDays > 30) {
      el.innerHTML = `${icon}<div class="count-text"><span class="count-num">${diffDays} days</span><span class="count-label">until the half marathon. Let's build up to it!</span></div>`;
    } else if (diffDays > 7) {
      el.innerHTML = `${icon}<div class="count-text"><span class="count-num">${diffDays} days</span><span class="count-label">to go. She's getting close!</span></div>`;
    } else if (diffDays > 1) {
      el.innerHTML = `${icon}<div class="count-text"><span class="count-num">${diffDays} days</span><span class="count-label">left. Final stretch!</span></div>`;
    } else if (diffDays === 1) {
      el.innerHTML = `${icon}<div class="count-text"><span class="count-num">Tomorrow!</span><span class="count-label">Half marathon eve. You've got this.</span></div>`;
    } else if (diffDays === 0) {
      el.innerHTML = `${icon}<div class="count-text"><span class="count-num">Race day!</span><span class="count-label">Go get it, Michelle!</span></div>`;
    } else {
      el.innerHTML = `${icon}<div class="count-text"><span class="count-num">13.1 down</span><span class="count-label">Half marathon complete. Amazing work.</span></div>`;
    }
  }

  fetchWeather();
  loadHistory();
  updateCountdown();
</script>

</body>
</html>
